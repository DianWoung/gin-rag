services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: go_rag
      MYSQL_USER: rag
      MYSQL_PASSWORD: rag
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  embedding:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    platform: linux/amd64
    restart: unless-stopped
    command:
      - --model-id
      - ${EMBEDDING_MODEL_ID:-sentence-transformers/all-MiniLM-L6-v2}
    ports:
      - "6008:80"
    volumes:
      - tei_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_PORT: 8080
      MYSQL_DSN: rag:rag@tcp(mysql:3306)/go_rag?charset=utf8mb4&parseTime=True&loc=Local
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
      QDRANT_HOST: qdrant
      QDRANT_GRPC_PORT: 6334
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://embedding:80/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:--}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      CHUNK_SIZE: 800
      CHUNK_OVERLAP: 120
    depends_on:
      embedding:
        condition: service_healthy
      mysql:
        condition: service_started
      qdrant:
        condition: service_started
    ports:
      - "8080:8080"

volumes:
  mysql_data:
  qdrant_data:
  tei_data:
